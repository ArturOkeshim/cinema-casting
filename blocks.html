<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema Casting - Blocks</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1200px 700px at 20% -10%, #1d2a56 0%, transparent 55%),
        radial-gradient(900px 700px at 110% 0%, #1f3f72 0%, transparent 45%),
        #0b1020;
      color: #e7ecff;
    }

    .layout {
      width: 100%;
      min-height: 100vh;
      margin: 0 auto;
      padding: 26px clamp(16px, 4vw, 40px) 40px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
    }

    .sub {
      margin: 0 0 18px;
      color: #b9c5f5;
      font-size: 17px;
      line-height: 1.5;
    }

    .actions {
      margin-bottom: 16px;
    }

    .link-btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 10px;
      padding: 9px 14px;
      background: #2a355f;
      color: #ffffff;
      font-weight: 600;
      font-size: 16px;
    }

    .empty {
      padding: 16px;
      border: 1px solid #44548f;
      border-radius: 10px;
      background: #151b31;
      color: #c7d0f6;
    }

    .blocks {
      display: grid;
      gap: 12px;
    }

    .block {
      border: 1px solid #2a355f;
      border-left: 4px solid #4f7cff;
      border-radius: 12px;
      background: #151b31;
      padding: 14px 14px 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.25);
      position: relative;
    }

    .role {
      margin: 0 120px 8px 0;
      font-size: 17px;
      color: #9fc0ff;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .text {
      margin: 0;
      white-space: pre-wrap;
      line-height: 1.5;
      color: #eef2ff;
      font-size: 17px;
      overflow-wrap: anywhere;
    }

    .annotation {
      margin: 0;
      padding: 2px 10px;
      font-style: italic;
      font-size: 15px;
      color: #6b7db3;
      line-height: 1.5;
    }

    .inline-annotation {
      font-style: italic;
      font-size: 13px;
      color: #4a5a8a;
    }

    .role-picker {
      margin-bottom: 20px;
      padding: 16px;
      border-radius: 12px;
      background: #151b31;
      border: 1px solid #2a355f;
    }

    .role-picker-label {
      display: block;
      margin-bottom: 10px;
      font-size: 15px;
      color: #b9c5f5;
    }

    .confirm-btn {
      margin-top: 14px;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 17px;
      font-weight: 600;
      background: #34d399;
      color: #0b1020;
    }

    .confirm-btn:hover {
      background: #6ee7b7;
    }

    .role-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #44548f;
      background: transparent;
      color: #b9c5f5;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }

    .chip:hover {
      border-color: #4f7cff;
      color: #e7ecff;
    }

    .chip.active {
      background: #4f7cff;
      border-color: #4f7cff;
      color: #fff;
    }

    .block.mine {
      border-left-color: #34d399;
      background: #0e1f18;
    }

    .block.mine .role {
      color: #34d399;
    }

    .block.dimmed {
      opacity: 0.35;
    }

    .block-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      margin: 0;
    }

    .block-edit-btn {
      border: 1px solid #44548f;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: #1a2240;
      color: #b9c5f5;
    }

    .block-edit-btn:hover {
      border-color: #4f7cff;
      color: #e7ecff;
    }

    .block--annotation .block-actions {
      position: static;
      display: flex;
      justify-content: flex-end;
      margin-bottom: 4px;
    }

    .block-edit-form {
      display: grid;
      gap: 10px;
    }

    .block-edit-form label {
      display: grid;
      gap: 6px;
      font-size: 14px;
      color: #9fc0ff;
    }

    .block-role-input,
    .block-text-input {
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
      border: 1px solid #44548f;
      background: #0e1430;
      color: #f4f7ff;
      font-size: 17px;
      font-family: inherit;
      padding: 10px 12px;
    }

    .block-text-input {
      min-height: 120px;
      resize: vertical;
      line-height: 1.45;
    }

    .block-edit-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .block-save-btn {
      border: none;
      border-radius: 10px;
      padding: 9px 16px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      background: #4f7cff;
      color: #fff;
    }

    .block-save-btn:hover {
      background: #6b94ff;
    }

    .block-cancel-btn {
      border: 1px solid #44548f;
      border-radius: 10px;
      padding: 9px 16px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      background: transparent;
      color: #b9c5f5;
    }

    .block-cancel-btn:hover {
      border-color: #6b7db3;
      color: #e7ecff;
    }

    @media (max-width: 760px) {
      .layout {
        padding-inline: 12px;
      }

      h1 {
        font-size: 26px;
      }

      .sub {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <h1>Разбор по блокам</h1>
    <p class="sub">Каждая реплика выделена отдельным блоком в порядке сцены. При необходимости отредактируйте блок и нажмите «Сохранить».</p>
    <div class="actions">
      <a class="link-btn" href="./index.html">Назад к сценарию</a>
    </div>
    <div id="rolePicker" class="role-picker" hidden>
      <span class="role-picker-label">Я читаю за:</span>
      <div id="roleChips" class="role-chips"></div>
      <button id="confirmRoleBtn" class="confirm-btn" hidden>Подтвердить роль →</button>
    </div>
    <section id="blocksContainer" class="blocks"></section>
  </main>

  <script type="module" src="./blocks.js"></script>
</body>
</html>
