<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema Casting</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e7ecff;
    }

    .card {
      width: min(760px, 92vw);
      padding: 24px;
      border-radius: 14px;
      background: #151b31;
      border: 1px solid #2a355f;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 16px;
      color: #b9c5f5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #44548f;
      background: #0e1430;
      color: #f4f7ff;
      resize: vertical;
      box-sizing: border-box;
      font-size: 15px;
      line-height: 1.5;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      background: #4f7cff;
      color: #fff;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      font-size: 14px;
      color: #b9c5f5;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Подготовка текста пробы</h1>
    <p>Вставь текст сцены, затем нажми кнопку, чтобы передать его в обработку.</p>

    <label for="scriptInput">Текст пробы</label>
    <textarea id="scriptInput" placeholder="Вставь сюда текст..."></textarea>

    <div class="actions">
      <button id="processBtn" type="button">Обработать</button>
      <span id="status" class="status">Ожидается ввод текста.</span>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
