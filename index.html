<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema Casting</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1020;
      color: #e7ecff;
    }

    .card {
      width: min(1200px, 96vw);
      padding: 24px;
      border-radius: 14px;
      background: #151b31;
      border: 1px solid #2a355f;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    p {
      margin: 0 0 16px;
      color: #b9c5f5;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #44548f;
      background: #0e1430;
      color: #f4f7ff;
      resize: vertical;
      box-sizing: border-box;
      font-size: 15px;
      line-height: 1.5;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      background: #4f7cff;
      color: #fff;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      font-size: 14px;
      color: #b9c5f5;
    }
    .quick-link {
      display: inline-block;
      margin-top: 14px;
      color: #9fc0ff;
      font-size: 14px;
      text-decoration: none;
    }
    .quick-link:hover {
      text-decoration: underline;
    }
    .loadingScreen {
      position: fixed;
      inset: 0;
      z-index: 2000;
      display: none;
      place-items: center;
      background: rgba(2, 8, 24, 0.72);
      backdrop-filter: blur(2px);
    }
    .loadingScreen.is-visible {
      display: grid;
    }
    .loadingScreen__panel {
      width: min(700px, 90vw);
      padding: 20px 24px;
      border-radius: 14px;
      border: 1px solid #2a355f;
      background: #151b31;
      color: #e7ecff;
      text-align: center;
      box-shadow: 0 14px 40px rgba(0, 0, 0, 0.35);
    }
    .loadingScreen__panel h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }
    .loadingScreen__panel p {
      margin: 0;
      color: #b9c5f5;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Подготовка текста пробы</h1>
    <p>Вставь текст сцены, затем нажми кнопку "Обработать" - алгоритм сам определит роли.</p>

    <textarea id="scriptInput" placeholder="Вставь сюда текст сценария"></textarea>

    <div class="actions">
      <button id="processBtn" type="button">Обработать</button>
    </div>
  </main>
  <div id="loadingScreen" class="loadingScreen" aria-hidden="true">
    <div class="loadingScreen__panel">
      <h2>Обрабатываем сценарий...</h2>
      <p>Разбираем текст на блоки и роли. Обычно у пленных индусов в нашем дата-центре это занимает до 30 секунд.</p>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
