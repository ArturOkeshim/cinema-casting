<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema Casting – Итог пробы</title>
  <style>
    :root { font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0b1020;
      color: #e7ecff;
    }

    .layout {
      width: min(1200px, 96vw);
      margin: 0 auto;
      padding: 24px 0 60px;
    }

    h1 { margin: 0 0 6px; font-size: 24px; }
    .sub { color: #b9c5f5; margin: 0 0 20px; font-size: 14px; }

    .btn-primary {
      border: none;
      border-radius: 10px;
      padding: 12px 26px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      background: #4f7cff;
      color: #fff;
      margin-bottom: 22px;
    }
    .btn-primary:hover { background: #6b94ff; }

    .result-list { display: grid; gap: 12px; margin-bottom: 28px; }

    .result-item {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 12px 16px;
      border-radius: 12px;
      background: #151b31;
      border: 1px solid #2a355f;
      border-left: 4px solid #4f7cff;
    }
    .result-item--actor { border-left-color: #34d399; }

    .result-label {
      font-size: 13px;
      color: #9fc0ff;
      flex: 1;
      min-width: 180px;
    }

    audio { height: 36px; border-radius: 6px; }

    .result-footer {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }
    .result-footer .btn-primary { margin-bottom: 0; }

    .result-footer .btn-secondary-outline {
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      background: #2a355f;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
    }
    .result-footer .btn-secondary-outline:hover { background: #374270; }

    .result-empty {
      color: #b9c5f5;
      font-size: 15px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main class="layout">
    <h1>Проба завершена</h1>
    <p class="sub">Послушайте результат</p>
    <button id="playAllBtn" type="button" class="btn-primary">▶ Воспроизвести всё</button>
    <div id="resultList" class="result-list"></div>
    <div class="result-footer">
      <button id="rehearseAgainBtn" type="button" class="btn-primary">Начать репетицию заново</button>
      <button id="rerecordPartnersBtn" type="button" class="btn-secondary-outline">Перезаписать реплики напарников</button>
    </div>
  </main>

  <script type="module" src="./result.js"></script>
</body>
</html>
