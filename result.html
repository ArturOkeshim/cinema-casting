<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema Casting – Итог пробы</title>
  <style>
    :root { font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1200px 700px at 20% -10%, #1d2a56 0%, transparent 55%),
        radial-gradient(900px 700px at 110% 0%, #1f3f72 0%, transparent 45%),
        #0b1020;
      color: #e7ecff;
    }

    .layout {
      width: 100%;
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px clamp(16px, 4vw, 40px) 60px;
    }

    h1 { margin: 0 0 6px; font-size: 30px; }
    .sub { color: #b9c5f5; margin: 0 0 20px; font-size: 17px; line-height: 1.5; }

    .btn-primary {
      border: none;
      border-radius: 10px;
      padding: 12px 26px;
      cursor: pointer;
      font-size: 17px;
      font-weight: 700;
      background: #4f7cff;
      color: #fff;
      margin-bottom: 22px;
    }
    .btn-primary:hover { background: #6b94ff; }

    .result-list { display: grid; gap: 12px; margin-bottom: 28px; }

    .result-item {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 12px 16px;
      border-radius: 12px;
      background: #151b31;
      border: 1px solid #2a355f;
      border-left: 4px solid #4f7cff;
    }
    .result-item--actor { border-left-color: #34d399; }

    .result-label {
      font-size: 15px;
      color: #9fc0ff;
      flex: 1;
      min-width: 180px;
      overflow-wrap: anywhere;
    }

    audio { height: 36px; border-radius: 6px; max-width: 100%; }

    .result-footer {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-top: 8px;
    }
    .result-footer .btn-primary { margin-bottom: 0; }

    .result-footer .btn-secondary-outline {
      border: none;
      border-radius: 10px;
      padding: 10px 18px;
      background: #2a355f;
      color: #fff;
      font-weight: 600;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
    }
    .result-footer .btn-secondary-outline:hover { background: #374270; }

    .result-empty {
      color: #b9c5f5;
      font-size: 17px;
      line-height: 1.5;
    }

    @media (max-width: 760px) {
      .layout {
        padding-inline: 12px;
      }

      h1 {
        font-size: 26px;
      }

      .sub {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="layout">
    <h1>Проба завершена</h1>
    <p class="sub">Послушайте результат</p>
    <button id="playAllBtn" type="button" class="btn-primary">▶ Воспроизвести всё</button>
    <div id="resultList" class="result-list"></div>
    <div class="result-footer">
      <button id="rehearseAgainBtn" type="button" class="btn-primary">Начать репетицию заново</button>
      <button id="rerecordPartnersBtn" type="button" class="btn-secondary-outline">Перезаписать реплики напарников</button>
    </div>
  </main>

  <script type="module" src="./result.js"></script>
</body>
</html>
