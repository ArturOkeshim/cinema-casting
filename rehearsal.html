<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema Casting – Репетиция</title>
  <style>
    :root {
      font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
      /* Отступ сверху для sticky-блока реплики: под липкую панель этапов (~одна строка). Если навигация переносится на две строки — увеличь. */
      --rehearsal-actor-sticky-top: 58px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(1200px 700px at 20% -10%, #1d2a56 0%, transparent 55%),
        radial-gradient(900px 700px at 110% 0%, #1f3f72 0%, transparent 45%),
        #0b1020;
      color: #e7ecff;
    }

    main[hidden] {
      display: none !important;
      pointer-events: none;
    }

    /* Пока не нажата «Начать запись», весь блок активной репетиции скрыт (надёжнее атрибута hidden в части браузеров). */
    #rehearsalActiveUi[hidden] {
      display: none !important;
    }

    /* Явно прячем секции, даже если их display задан классами ниже. */
    #rehearsalActiveUi section[hidden] {
      display: none !important;
    }

    .layout {
      width: 100%;
      min-height: 100vh;
      margin: 0 auto;
      padding: 24px clamp(16px, 4vw, 40px) 60px;
    }

    #rehearsalActiveUi {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .script-viewport {
      position: relative;
      overflow: hidden;
      min-height: clamp(420px, 74vh, 760px);
      background: transparent;
      padding: 0;
    }

    .script-lane {
      display: grid;
      gap: 0;
      transition: transform 620ms cubic-bezier(0.2, 0.7, 0.2, 1);
      will-change: transform;
    }

    .script-line {
      margin: 0;
      font-size: clamp(22px, 3.2vw, 44px);
      line-height: 1.12;
      font-weight: 500;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      padding: 0 clamp(1.2em, 4vw, 4.8em) 0 0;
      min-height: 0;
    }

    .script-line__role {
      display: block;
      margin-bottom: 4px;
      font-size: clamp(12px, 1vw, 15px);
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .script-line.actor .script-line__role {
      color: #9ea6b8;
    }

    .script-line.partner .script-line__role {
      color: #88a0d9;
    }

    .script-line__text {
      display: inline-block;
      transform-origin: left center;
      transform: scale(1);
      transition: transform 320ms ease, color 260ms ease, opacity 260ms ease;
      will-change: transform;
      opacity: 1;
    }

    .script-line.actor .script-line__text {
      color: #d4d9e6;
    }

    .script-line.partner .script-line__text {
      color: #93a8df;
    }

    .script-line.is-current .script-line__text {
      transform: scale(1.05);
      color: #eef4ff;
    }

    .script-line.actor.is-current .script-line__text {
      color: #ffffff;
    }

    .script-line.partner.is-current .script-line__text {
      color: #adc1f3;
    }

    .script-line.dist-1 .script-line__text { opacity: 0.44; }
    .script-line.dist-2 .script-line__text { opacity: 0.26; }
    .script-line.dist-3plus .script-line__text { opacity: 0.14; }

    .script-line__progress {
      display: none;
      margin: 8px auto 0;
      width: clamp(96px, 16vw, 160px);
      height: 4px;
      border-radius: 999px;
      border: 1px solid rgba(124, 145, 205, 0.65);
      background: rgba(74, 93, 150, 0.14);
      overflow: hidden;
      opacity: 1;
      line-height: 0;
      font-size: 0;
    }

    .script-line.is-current .script-line__progress {
      display: block;
    }

    .script-line__progress-track {
      display: block;
      position: relative;
      width: 100%;
      height: 100%;
    }

    .script-line__progress-fill {
      display: block;
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #7aa2ff 0%, #a9c3ff 100%);
      transition: width 80ms linear;
    }

    .script-live {
      margin-top: 10px;
      color: #90a2d8;
      font-size: 13px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .rh-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .actor-badge {
      padding: 4px 14px;
      border-radius: 20px;
      background: #34d399;
      color: #0b1020;
      font-weight: 700;
      font-size: 13px;
    }

    .step-counter {
      margin-left: auto;
      font-size: 13px;
      color: #6b7db3;
    }

    .btn-skip {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      background: #374270;
      color: #e7ecff;
      margin-left: auto;
    }

    .btn-skip:hover { background: #44548f; }

    /* ── loading / error ── */
    .loading-text {
      color: #b9c5f5;
      font-size: 15px;
      padding: 40px 0;
    }

    #loadingSection.loading-section--countdown {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: min(48vh, 420px);
    }

    .loading-text.countdown {
      font-size: clamp(72px, 20vw, 128px);
      font-weight: 800;
      padding: 24px 0;
      letter-spacing: 0.06em;
      color: #e7ecff;
      line-height: 1;
      text-align: center;
    }

    .btn-primary {
      border: none;
      border-radius: 10px;
      padding: 12px 26px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      background: #4f7cff;
      color: #fff;
      margin-bottom: 22px;
    }
    .btn-primary:hover { background: #6b94ff; }

    .annotation-inline {
      font-style: italic;
      font-size: 0.82em;
      color: #4a5a8a;
    }

    /* ── старт пробы ── */
    .start-gate {
      display: grid;
      gap: 18px;
      justify-items: center;
      padding: 32px 0 24px;
    }
    .start-gate .start-hint {
      margin: 0;
      color: #b9c5f5;
      font-size: 15px;
      line-height: 1.5;
      max-width: 42ch;
    }
    .start-gate .start-gate-error {
      margin: 0;
      color: #f87171;
      font-size: 15px;
      line-height: 1.5;
      max-width: 48ch;
    }
    .start-gate .btn-primary {
      margin-bottom: 0;
    }

    @media (max-width: 760px) {
      .layout {
        padding-inline: 12px;
      }

      .btn-skip {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>

  <!-- ═══ Страница репетиции ═══ -->
  <main id="rehearsalView" class="layout">
    <section id="startGate" class="start-gate">
      <p class="start-hint">Когда будете готовы, начните запись пробы.</p>
      <p id="startGateError" class="start-gate-error" hidden></p>
      <button type="button" id="startRehearsalBtn" class="btn-primary">Начать запись пробы</button>
    </section>
    <div id="rehearsalActiveUi" hidden>
      <div id="rehearsalHeader" class="rh-header" hidden>
        <span id="actorBadge" class="actor-badge"></span>
        <span id="stepCounter" class="step-counter"></span>
        <button id="skipBtn" class="btn-skip" hidden>Готово →</button>
      </div>
      <section id="scriptViewportSection" class="script-viewport" hidden>
        <div id="scriptLane" class="script-lane"></div>
        <div id="scriptLive" class="script-live"></div>
      </section>
      <section id="loadingSection" hidden>
        <p id="loadingText" class="loading-text">Загрузка…</p>
      </section>
    </div>
  </main>

  <script type="module" src="./rehearsal.js"></script>
</body>
</html>
