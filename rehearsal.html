<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinema Casting – Репетиция</title>
  <style>
    :root { font-family: Inter, Segoe UI, Roboto, Arial, sans-serif; }

    body {
      margin: 0;
      min-height: 100vh;
      background: #0b1020;
      color: #e7ecff;
    }

    .layout {
      width: min(800px, 92vw);
      margin: 0 auto;
      padding: 24px 0 60px;
    }

    /* ── header ── */
    .rh-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .actor-badge {
      padding: 4px 14px;
      border-radius: 20px;
      background: #34d399;
      color: #0b1020;
      font-weight: 700;
      font-size: 13px;
    }

    .step-counter {
      margin-left: auto;
      font-size: 13px;
      color: #6b7db3;
    }

    .scene-overview {
      margin-bottom: 20px;
      display: grid;
      gap: 14px;
    }

    .scene-summary {
      display: grid;
      gap: 10px;
      padding: 14px 16px;
      background: #151b31;
      border: 1px solid #2a355f;
      border-radius: 12px;
    }

    .scene-summary-main {
      font-size: 17px;
      color: #e7ecff;
      font-weight: 600;
    }

    .scene-summary-next {
      font-size: 15px;
      color: #b9c5f5;
      line-height: 1.55;
    }

    .scene-timeline {
      display: grid;
      gap: 8px;
    }

    .timeline-item {
      display: grid;
      grid-template-columns: 84px 1fr;
      gap: 10px;
      align-items: start;
      padding: 12px 14px;
      border-radius: 10px;
      background: #12182f;
      border: 1px solid #263057;
      opacity: 0.92;
    }

    .timeline-item--current {
      border-color: #4f7cff;
      background: #162043;
      opacity: 1;
    }

    .timeline-item--done {
      opacity: 0.55;
    }

    .timeline-item--actor {
      border-left: 4px solid #34d399;
    }

    .timeline-item--partner {
      border-left: 4px solid #4f7cff;
    }

    .timeline-badge {
      min-width: 72px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      color: #9fc0ff;
    }

    .timeline-item--actor .timeline-badge {
      color: #7ee7bf;
    }

    .timeline-text {
      font-size: 15px;
      color: #dbe4ff;
      line-height: 1.55;
    }

    .timeline-meta {
      display: block;
      margin-bottom: 6px;
      font-size: 12px;
      color: #7f90c7;
      text-transform: uppercase;
      letter-spacing: 0.35px;
    }

    .timeline-lines {
      display: grid;
      gap: 6px;
    }

    .timeline-line {
      display: flex;
      gap: 10px;
      align-items: baseline;
      flex-wrap: wrap;
    }

    .timeline-role {
      font-size: 12px;
      font-weight: 700;
      color: #9fc0ff;
      min-width: 92px;
    }

    .timeline-item--actor .timeline-role {
      color: #7ee7bf;
    }

    .timeline-line-text {
      flex: 1;
      min-width: 0;
    }

    /* ── sections ── */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.6px;
      text-transform: uppercase;
      color: #6b7db3;
      margin-bottom: 12px;
    }

    /* ── partner ── */
    .lines-list { display: grid; gap: 10px; }

    .line-row {
      display: flex;
      gap: 12px;
      align-items: baseline;
      padding: 10px 14px;
      background: #151b31;
      border-radius: 10px;
      border: 1px solid #2a355f;
    }

    .line-role {
      font-size: 14px;
      font-weight: 700;
      color: #9fc0ff;
      min-width: 126px;
      flex-shrink: 0;
    }

    .line-text {
      font-size: 19px;
      color: #c7d0f6;
      line-height: 1.65;
    }

    /* ── actor teleprompter ── */
    .actor-line {
      font-size: 38px;
      line-height: 1.55;
      color: #f0f4ff;
      font-weight: 500;
      padding: 22px 24px;
      background: #0e1430;
      border: 1px solid #3a4a80;
      border-radius: 14px;
      margin-bottom: 14px;
      min-height: 80px;
    }

    .live-transcript {
      font-size: 19px;
      color: #4f7cff;
      min-height: 36px;
      padding: 10px 14px;
      border-radius: 8px;
      background: #0e1020;
      margin-bottom: 16px;
    }

    .rec-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      font-size: 15px;
      color: #9fc0ff;
    }

    .rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .btn-skip {
      border: none;
      border-radius: 10px;
      padding: 12px 24px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      background: #374270;
      color: #e7ecff;
    }

    .btn-skip:hover { background: #44548f; }

    /* ── loading / error ── */
    .loading-text {
      color: #b9c5f5;
      font-size: 15px;
      padding: 40px 0;
    }

    /* ── result ── */
    h1 { margin: 0 0 6px; font-size: 24px; }
    .sub { color: #b9c5f5; margin: 0 0 20px; font-size: 14px; }

    .btn-primary {
      border: none;
      border-radius: 10px;
      padding: 12px 26px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 700;
      background: #4f7cff;
      color: #fff;
      margin-bottom: 22px;
    }
    .btn-primary:hover { background: #6b94ff; }

    .result-list { display: grid; gap: 12px; margin-bottom: 28px; }

    .result-item {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 12px 16px;
      border-radius: 12px;
      background: #151b31;
      border: 1px solid #2a355f;
      border-left: 4px solid #4f7cff;
    }
    .result-item--actor { border-left-color: #34d399; }

    .result-label {
      font-size: 13px;
      color: #9fc0ff;
      flex: 1;
      min-width: 180px;
    }

    audio { height: 36px; border-radius: 6px; }

    .result-footer {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .link-btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 18px;
      background: #2a355f;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
    }
    .link-btn:hover { background: #374270; }

    .annotation-inline {
      font-style: italic;
      font-size: 0.82em;
      color: #4a5a8a;
    }
  </style>
</head>
<body>

  <!-- ═══ Страница репетиции ═══ -->
  <main id="rehearsalView" class="layout">
    <div class="rh-header">
      <span id="actorBadge" class="actor-badge"></span>
      <span id="stepCounter" class="step-counter"></span>
    </div>

    <section class="scene-overview">
      <div class="scene-summary">
        <div id="sceneSummaryMain" class="scene-summary-main">Загрузка сцены…</div>
        <div id="sceneSummaryNext" class="scene-summary-next"></div>
      </div>
      <div id="sceneTimeline" class="scene-timeline"></div>
    </section>

    <!-- Загрузка / ошибка -->
    <section id="loadingSection">
      <p id="loadingText" class="loading-text">Загрузка…</p>
    </section>

    <!-- Партнёрский сегмент -->
    <section id="partnerSection" hidden>
      <p class="section-label">▶ Партнёр</p>
      <div id="partnerLines" class="lines-list"></div>
    </section>

    <!-- Реплика актёра -->
    <section id="actorSection" hidden>
      <p class="section-label">⏺ Ваша реплика</p>
      <div id="actorLine" class="actor-line"></div>
      <div id="liveTranscript" class="live-transcript"></div>
      <div class="rec-indicator">
        <span class="rec-dot"></span>
        <span id="recStatus">Слушаем…</span>
      </div>
      <button id="skipBtn" class="btn-skip">Готово →</button>
    </section>
  </main>

  <!-- ═══ Страница результата ═══ -->
  <main id="resultView" class="layout" hidden>
    <h1>Проба завершена</h1>
    <p class="sub">Послушайте результат</p>
    <button id="playAllBtn" class="btn-primary">▶ Воспроизвести всё</button>
    <div id="resultList" class="result-list"></div>
    <div class="result-footer">
      <a href="./index.html" class="link-btn">Начать заново</a>
      <a href="./blocks.html" class="link-btn">Выбрать другую роль</a>
    </div>
  </main>

  <script type="module" src="./rehearsal.js"></script>
</body>
</html>
